<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Green Reader</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--accent:#b8f57a;--red:#ff5a5a;--blue:#5ab4ff;--text:#d4e8c2;--muted:#6a8a5a;--panel:rgba(5,13,5,0.94)}
  html,body{width:100%;height:100%;background:#6fa5c4;overflow:hidden;touch-action:none}
  #app{width:100%;height:100dvh;display:flex;flex-direction:column;position:relative}
  #canvas-wrap{flex:1;position:relative;min-height:0}
  #c{width:100%;height:100%;display:block}
  #aim-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  #topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;background:linear-gradient(to bottom,rgba(3,8,3,0.97) 55%,transparent);pointer-events:none}
  #topbar h1{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--accent);text-shadow:0 0 16px rgba(184,245,122,0.35)}
  .top-stats{display:flex;gap:14px}
  .tstat-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px}
  .tstat-val{font-family:'DM Mono',monospace;font-size:13px;color:var(--text);font-weight:500}
  #hint{position:absolute;z-index:5;pointer-events:none;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;line-height:1.9;text-align:right;top:52px;right:12px}
  #panel{position:relative;z-index:20;background:var(--panel);border-top:1px solid rgba(184,245,122,0.1);backdrop-filter:blur(14px);padding:10px 16px 12px}
  #panel-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:18px}
  .section-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:5px}
  #diff-row{display:flex;gap:4px}
  .diff-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:5px 9px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
  .diff-btn.active{background:rgba(184,245,122,0.12);border-color:var(--accent);color:var(--accent)}
  .spd-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;padding:5px 9px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
  .spd-btn.active{background:rgba(90,180,255,0.12);border-color:var(--blue);color:var(--blue)}
  #power-block{display:flex;align-items:center;gap:10px;flex:1;min-width:160px;max-width:300px}
  #power-num{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--accent);min-width:52px;text-align:center;line-height:1}
  #power-unit{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);text-align:center}
  #power-slider-wrap{flex:1}
  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;outline:none;cursor:pointer;background:linear-gradient(to right,#4ade80,#b8f57a 50%,#fad03a)}
  input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;margin-top:-8px;background:#fff;box-shadow:0 0 8px rgba(184,245,122,.7);cursor:grab}
  input[type=range]:active::-webkit-slider-thumb{cursor:grabbing}
  input[type=range]::-moz-range-track{height:6px;border-radius:3px;background:linear-gradient(to right,#4ade80,#b8f57a 50%,#fad03a)}
  input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;border:none;background:#fff;box-shadow:0 0 8px rgba(184,245,122,.7);cursor:grab}
  #btn-group{display:flex;gap:6px;align-items:center}
  .btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;padding:7px 13px;border-radius:4px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn:hover{background:rgba(255,255,255,.11)}
  .btn.putt{background:var(--accent);color:#0a1a0a;border-color:var(--accent);font-size:11px;font-weight:500;padding:7px 18px;box-shadow:0 0 16px rgba(184,245,122,.3)}
  .btn.putt:hover{background:#d0ffaa}
  .btn.putt:disabled{opacity:.3;cursor:not-allowed;box-shadow:none}
  .btn.ideal-on{border-color:var(--blue);color:var(--blue)}
  .btn.pin-out{border-color:#fad03a;color:#fad03a;background:rgba(250,208,58,0.08)}
  #msg{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);flex:1;min-width:80px;line-height:1.4}
  #msg.good{color:var(--accent)}
  #msg.bad{color:var(--red)}
  #result-row{max-width:960px;margin:5px auto 0;display:none;gap:14px;flex-wrap:wrap}
  .rstat{font-family:'DM Mono',monospace;font-size:9px}
  .rstat-l{color:var(--muted);margin-right:3px}
  .rstat-v{color:var(--text)}
  body.is-mobile #topbar h1{font-size:16px}
  body.is-mobile .tstat-val{font-size:11px}
  body.is-mobile .top-stats{gap:10px}
  body.is-mobile #hint{display:none}
  body.is-mobile #panel{padding:8px 12px 10px}
  body.is-mobile #panel-inner{flex-direction:column;align-items:stretch;gap:8px}
  body.is-mobile #power-block{max-width:none;min-width:0}
  body.is-mobile #power-num{font-size:24px;min-width:40px}
  body.is-mobile input[type=range]{height:8px}
  body.is-mobile input[type=range]::-webkit-slider-thumb{width:28px;height:28px;margin-top:-10px}
  body.is-mobile input[type=range]::-moz-range-thumb{width:28px;height:28px}
  body.is-mobile .diff-btn{font-size:10px;padding:7px 12px}
  body.is-mobile #btn-group{gap:5px}
  body.is-mobile .btn{flex:1;text-align:center;padding:11px 4px;font-size:10px}
  body.is-mobile .btn.putt{flex:1.4;font-size:11px}
  body.is-mobile #msg{text-align:center;font-size:10px}
  body.is-mobile #mobile-top{display:flex;gap:12px;align-items:flex-end}
  #mobile-top{display:none}

  /* ── Settings modal ─────────────────────────────────────── */
  #settings-overlay{
    position:fixed;inset:0;z-index:100;
    background:rgba(0,0,0,0.72);
    backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;
  }
  #settings-overlay.open{display:flex;}
  #settings-box{
    background:#060f06;border:1px solid rgba(184,245,122,0.18);
    border-radius:8px;padding:28px 28px 22px;width:min(420px,94vw);
    box-shadow:0 0 48px rgba(0,0,0,0.7);
  }
  #settings-box h2{
    font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;
    color:var(--accent);margin-bottom:18px;
  }
  .sett-row{margin-bottom:16px;}
  .sett-row-label{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:6px;}
  .sett-btns{display:flex;gap:4px;flex-wrap:wrap;}
  .sett-btn{
    font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;
    padding:6px 10px;border-radius:3px;border:1px solid rgba(255,255,255,0.1);
    background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
    white-space:nowrap;
  }
  .sett-btn.active-break{background:rgba(184,245,122,0.12);border-color:var(--accent);color:var(--accent);}
  .sett-btn.active-speed{background:rgba(90,180,255,0.12);border-color:var(--blue);color:var(--blue);}
  .sett-btn.active-dist{background:rgba(250,208,58,0.12);border-color:#fad03a;color:#fad03a;}
  #settings-close{
    margin-top:20px;width:100%;
    font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;
    padding:10px;border-radius:4px;border:1px solid rgba(184,245,122,0.3);
    background:rgba(184,245,122,0.08);color:var(--accent);cursor:pointer;transition:all .15s;
  }
  #settings-close:hover{background:rgba(184,245,122,0.16);}
  #btn-settings{position:relative;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>Green Reader</h1>
    <div class="top-stats">
      <div class="tstat"><div class="tstat-label">AIM</div><div class="tstat-val" id="s-aim">—</div></div>
      <div class="tstat"><div class="tstat-label">IDEAL</div><div class="tstat-val" id="s-ideal">—</div></div>
      <div class="tstat"><div class="tstat-label">RESULT</div><div class="tstat-val" id="s-res">—</div></div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <canvas id="aim-canvas"></canvas>
    <div id="hint">DRAG · ORBIT<br>SCROLL · ZOOM<br>CLICK · AIM</div>
  </div>
  <div id="panel">
    <div id="panel-inner">
      <div id="power-block">
        <div><div id="power-num">55</div><div id="power-unit">%</div></div>
        <div id="power-slider-wrap">
          <div class="section-label">POWER</div>
          <input type="range" id="power-range" min="5" max="100" value="55" step="1">
        </div>
      </div>
      <div id="mobile-top">
        <div style="flex:1">
          <div class="section-label">POWER — <span id="power-num-m">55</span>%</div>
          <input type="range" id="power-range-m" min="5" max="100" value="55" step="1" style="width:100%;margin-top:5px">
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;min-width:0">
        <div id="btn-group">
          <button class="btn putt" id="btn-putt" disabled>PUTT</button>
          <button class="btn" id="btn-pin">PIN IN</button>
          <button class="btn" id="btn-ideal">IDEAL LINE</button>
          <button class="btn" id="btn-new">NEW GREEN</button>
          <button class="btn" id="btn-reset">RESET</button>
          <button class="btn" id="btn-settings">⚙ SETTINGS</button>
        </div>
        <div id="msg">Click the green to set your aim point</div>
      </div>
    </div>
    <div id="result-row">
      <div class="rstat"><span class="rstat-l">YOUR AIM</span><span class="rstat-v" id="r-aim">—</span></div>
      <div class="rstat"><span class="rstat-l">IDEAL AIM</span><span class="rstat-v" id="r-ideal">—</span></div>
      <div class="rstat"><span class="rstat-l">DIST TO HOLE</span><span class="rstat-v" id="r-dist">—</span></div>
    </div>
  </div>
</div>

<!-- ── SETTINGS MODAL ─────────────────────────────────────────────────── -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>⚙ SETTINGS</h2>

    <div class="sett-row">
      <div class="sett-row-label">BREAK DIFFICULTY</div>
      <div class="sett-btns" id="sett-break">
        <button class="sett-btn active-break" data-d="easy">GENTLE</button>
        <button class="sett-btn" data-d="medium">MEDIUM</button>
        <button class="sett-btn" data-d="hard">NASTY</button>
      </div>
    </div>

    <div class="sett-row">
      <div class="sett-row-label">GREEN SPEED (STIMPMETER)</div>
      <div class="sett-btns" id="sett-speed">
        <button class="sett-btn" data-s="slow">SLOW · 7</button>
        <button class="sett-btn active-speed" data-s="medium">MED · 10</button>
        <button class="sett-btn" data-s="fast">FAST · 13</button>
      </div>
    </div>

    <div class="sett-row">
      <div class="sett-row-label">PUTT DISTANCE</div>
      <div class="sett-btns" id="sett-dist">
        <button class="sett-btn" data-dist="vshort">V.SHORT<br><span style="font-size:8px;color:#888">1–3 ft</span></button>
        <button class="sett-btn" data-dist="short">SHORT<br><span style="font-size:8px;color:#888">3–8 ft</span></button>
        <button class="sett-btn active-dist" data-dist="medium">MEDIUM<br><span style="font-size:8px;color:#888">8–20 ft</span></button>
        <button class="sett-btn" data-dist="far">FAR<br><span style="font-size:8px;color:#888">20–40 ft</span></button>
        <button class="sett-btn" data-dist="vfar">V.FAR<br><span style="font-size:8px;color:#888">40–60 ft</span></button>
      </div>
    </div>

    <button id="settings-close">DONE — APPLY ON NEXT GREEN</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── DEVICE ───────────────────────────────────────────────────────────────────
const isMobile = ('ontouchstart' in window) || navigator.maxTouchPoints > 0 || window.innerWidth <= 640;
if (isMobile) {
  document.body.classList.add('is-mobile');
  document.getElementById('mobile-top').style.display = 'flex';
  document.getElementById('desktop-diff').style.display = 'none';
  document.getElementById('power-block').style.display = 'none';
}

// ─── POWER SLIDER ─────────────────────────────────────────────────────────────
let strength = 55;
function setStrength(v) {
  strength = Math.max(5, Math.min(100, Math.round(+v)));
  document.getElementById('power-range').value = strength;
  document.getElementById('power-range-m').value = strength;
  document.getElementById('power-num').textContent = strength;
  document.getElementById('power-num-m').textContent = strength;
}
document.getElementById('power-range').addEventListener('input', e => setStrength(e.target.value));
document.getElementById('power-range-m').addEventListener('input', e => setStrength(e.target.value));

// ─── DIFFICULTY + SPEED ───────────────────────────────────────────────────────
// Settings state — driven by modal only
let settBreak = 'easy';
let settSpeed = 'medium';
let settDist  = new Set(['medium']); // multi-select

function getActiveDiff()  { return settBreak; }
function getActiveSpeed() { return settSpeed; }
function getActiveDist() {
  // Pick a random distance key from the selected set
  const keys = [...settDist];
  return keys[Math.floor(Math.random() * keys.length)];
}
function getDistRange() {
  // Merge all selected distance ranges into one combined [min, max]
  const keys = [...settDist];
  if (!keys.length) keys.push('medium');
  let lo = Infinity, hi = -Infinity;
  for (const k of keys) {
    const [a, b] = DIST_RANGES[k] || DIST_RANGES.medium;
    if (a < lo) lo = a;
    if (b > hi) hi = b;
  }
  return [lo, hi];
}

// Settings modal wiring
function openSettings() {
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}
document.getElementById('btn-settings').addEventListener('click', openSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay')) closeSettings();
});

document.querySelectorAll('#sett-break .sett-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sett-break .sett-btn').forEach(b => b.classList.remove('active-break'));
    btn.classList.add('active-break');
    settBreak = btn.dataset.d;
  });
});
document.querySelectorAll('#sett-speed .sett-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#sett-speed .sett-btn').forEach(b => b.classList.remove('active-speed'));
    btn.classList.add('active-speed');
    settSpeed = btn.dataset.s;
  });
});
document.querySelectorAll('#sett-dist .sett-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.dist;
    if (settDist.has(k)) {
      if (settDist.size > 1) { settDist.delete(k); btn.classList.remove('active-dist'); }
      // else: keep at least one selected, do nothing
    } else {
      settDist.add(k);
      btn.classList.add('active-dist');
    }
  });
});

// ─── RENDERER ─────────────────────────────────────────────────────────────────
const container = document.getElementById('canvas-wrap');
const canvas3d  = document.getElementById('c');
const aimCanvas = document.getElementById('aim-canvas');
const aimCtx    = aimCanvas.getContext('2d');

const renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: !isMobile });
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setPixelRatio(Math.min(devicePixelRatio, isMobile ? 1.5 : 2));
renderer.setClearColor(0x8cb8d8, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x8cb8d8, 0.005);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 400);
let orbitTheta = 0.1, orbitPhi = 0.62, orbitR = isMobile ? 14 : 10;
const orbitTarget = new THREE.Vector3(0, 0.5, 0);

function updateCamera() {
  camera.position.x = orbitTarget.x + orbitR * Math.sin(orbitTheta) * Math.cos(orbitPhi);
  camera.position.y = orbitTarget.y + orbitR * Math.sin(orbitPhi);
  camera.position.z = orbitTarget.z + orbitR * Math.cos(orbitTheta) * Math.cos(orbitPhi);
  camera.lookAt(orbitTarget);
}
updateCamera();

function resize() {
  const w = container.clientWidth, h = container.clientHeight;
  renderer.setSize(w, h);
  aimCanvas.width = w; aimCanvas.height = h;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ─── LIGHTING ────────────────────────────────────────────────────────────────
scene.add(new THREE.HemisphereLight(0xb0e4ff, 0x444444, 0.75));
const sun = new THREE.DirectionalLight(0xfff4c8, 1.4);
sun.position.set(18, 30, 14);
sun.castShadow = true;
sun.shadow.mapSize.set(isMobile ? 1024 : 2048, isMobile ? 1024 : 2048);
sun.shadow.camera.left = -50; sun.shadow.camera.right = 50;
sun.shadow.camera.top  =  50; sun.shadow.camera.bottom = -50;
sun.shadow.camera.far  = 120;
sun.shadow.bias = -0.001;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x88aadd, 0.18);
fill.position.set(-14, 8, -16);
scene.add(fill);

// ─── SKY DOME ────────────────────────────────────────────────────────────────
(function buildSky() {
  const geo = new THREE.SphereGeometry(300, 32, 20);
  const cnt = geo.attributes.position.count;
  const colors = new Float32Array(cnt * 3);
  const pos = geo.attributes.position;
  for (let i = 0; i < cnt; i++) {
    const y = pos.getY(i);
    const t = Math.max(0, Math.min(1, (y + 30) / 310));
    colors[i*3]   = 0.54 - t * 0.26;
    colors[i*3+1] = 0.75 - t * 0.18;
    colors[i*3+2] = 0.88 - t * 0.06;
  }
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.scale(-1, 1, 1);
  scene.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true, depthWrite: false })));

  const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.55, depthWrite: false });
  for (let c = 0; c < 12; c++) {
    const cGrp = new THREE.Group();
    const ang = (c / 12) * Math.PI * 2 + Math.random() * 0.5;
    const r = 180 + Math.random() * 60;
    const ht = 60 + Math.random() * 60;
    cGrp.position.set(Math.cos(ang) * r, ht, Math.sin(ang) * r);
    for (let b = 0; b < 4; b++) {
      const blob = new THREE.Mesh(
        new THREE.SphereGeometry(8 + Math.random() * 10, 7, 5), cloudMat
      );
      blob.position.set((Math.random()-0.5)*18, (Math.random()-0.5)*5, (Math.random()-0.5)*12);
      cGrp.add(blob);
    }
    scene.add(cGrp);
  }
})();

// ─── ORBIT + INPUT ───────────────────────────────────────────────────────────
let isDragging = false, lastMx = 0, lastMy = 0, dragMoved = false;
function orbitStart(x,y){ isDragging=true; dragMoved=false; lastMx=x; lastMy=y; }
function orbitMove(x,y){
  if(!isDragging) return;
  if(Math.hypot(x-lastMx,y-lastMy)>3) dragMoved=true;
  orbitTheta -= (x-lastMx)*0.007;
  orbitPhi = Math.max(0.1, Math.min(1.1, orbitPhi-(y-lastMy)*0.007));
  lastMx=x; lastMy=y; updateCamera();
}
canvas3d.addEventListener('mousedown', e => orbitStart(e.clientX,e.clientY));
window.addEventListener('mousemove',   e => { if(isDragging) orbitMove(e.clientX,e.clientY); });
window.addEventListener('mouseup',     () => { isDragging=false; });
canvas3d.addEventListener('wheel', e => { orbitR=Math.max(8,Math.min(80,orbitR+e.deltaY*0.05)); updateCamera(); },{passive:true});
canvas3d.addEventListener('contextmenu', e=>e.preventDefault());
canvas3d.addEventListener('click', e => { if(!dragMoved) handleAim(e.clientX,e.clientY); });

let lastPinch=0;
canvas3d.addEventListener('touchstart', e=>{
  if(e.touches.length===1) orbitStart(e.touches[0].clientX,e.touches[0].clientY);
  if(e.touches.length===2) lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
canvas3d.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(e.touches.length===1) orbitMove(e.touches[0].clientX,e.touches[0].clientY);
  if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    orbitR=Math.max(8,Math.min(80,orbitR-(d-lastPinch)*0.07)); lastPinch=d; updateCamera();
  }
},{passive:false});
canvas3d.addEventListener('touchend', e=>{
  isDragging=false;
  if(!dragMoved&&e.changedTouches.length===1) handleAim(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
},{passive:true});

// ─── TEXTURES ────────────────────────────────────────────────────────────────
function makeGreenTexture() {
  const size = 512, c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#2f6f3e';
  ctx.fillRect(0, 0, size, size);
  const stripeW = 44;
  for (let i = 0; i < size / stripeW; i++) {
    ctx.fillStyle = i % 2 === 0 ? 'rgba(0,0,0,0.0)' : 'rgba(255,255,255,0.07)';
    ctx.fillRect(0, i * stripeW, size, stripeW);
  }
  for (let i = 0; i < 80000; i++) {
    const x = Math.random() * size, y = Math.random() * size;
    ctx.fillStyle = Math.random() < 0.5
      ? `rgba(60,140,70,${0.03 + Math.random()*0.05})`
      : `rgba(8,32,12,${0.03 + Math.random()*0.05})`;
    ctx.fillRect(x, y, 1, 1);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
  return tex;
}

function makeRoughTexture() {
  const size = 256, c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#1f442a';
  ctx.fillRect(0, 0, size, size);
  for(let p=0;p<40;p++){
    const px=(Math.random()*size), py=(Math.random()*size), pr=8+Math.random()*20;
    const grd=ctx.createRadialGradient(px,py,0,px,py,pr);
    grd.addColorStop(0,'rgba(4,14,6,0.35)'); grd.addColorStop(1,'rgba(4,14,6,0)');
    ctx.fillStyle=grd; ctx.beginPath(); ctx.arc(px,py,pr,0,Math.PI*2); ctx.fill();
  }
  const r=(a,b)=>a+Math.random()*(b-a);
  for(let i=0;i<18000;i++){
    const x=r(0,size), y=r(0,size), l=r(6,20), ang=r(-0.7,0.7)+Math.PI*1.5;
    const dark=Math.random()>0.5;
    ctx.strokeStyle=dark?`rgba(3,14,5,${r(0.10,0.22)})`:`rgba(30,80,25,${r(0.04,0.13)})`;
    ctx.lineWidth=r(0.6,2.0);
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+Math.cos(ang)*l, y+Math.sin(ang)*l); ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.needsUpdate = true;
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(14,14);
  return tex;
}

// ─── TERRAIN CONSTANTS ───────────────────────────────────────────────────────
let GX=30, GZ=30;
const SEG=isMobile?52:72;

function rng(a,b){ return a+Math.random()*(b-a); }

// ─── TERRAIN DATA ────────────────────────────────────────────────────────────
// Putt distance ranges (feet → metres):
//   v.short : 1–3 ft  = 0.30–0.91 m
//   short   : 3–8 ft  = 0.91–2.44 m
//   medium  : 8–20 ft = 2.44–6.10 m
//   far     : 20–40ft = 6.10–12.19 m
//   v.far   : 40–60ft = 12.19–18.29 m
const DIST_RANGES = {
  vshort: [0.30, 0.91],
  short:  [0.91, 2.44],
  medium: [2.44, 6.10],
  far:    [6.10, 12.19],
  vfar:   [12.19, 18.29],
};

function makeTerrain(){
  const diff=getActiveDiff();
  const s=diff==='easy'?0.38:diff==='medium'?0.85:1.5;
  const n=diff==='easy'?2:diff==='medium'?3:5;

  // Choose green size to fit the desired putt distance comfortably
  const [dMin, dMax] = getDistRange();
  const minGreen = Math.max(8, dMax * 2.2 + 4);
  const maxGreen = Math.max(minGreen + 4, dMax * 3.5 + 6);

  const archetypes = ['rect','rect','wide','wide','deep','deep','square'];
  const arch = archetypes[Math.floor(Math.random()*archetypes.length)];
  let gw, gd;
  if(arch==='square'){ const sz=rng(minGreen, Math.min(maxGreen,34)); gw=sz; gd=sz; }
  else if(arch==='wide'){ gw=rng(minGreen, Math.min(maxGreen,50)); gd=rng(minGreen*0.6, Math.min(maxGreen*0.7,28)); }
  else if(arch==='deep'){ gw=rng(minGreen*0.6, Math.min(maxGreen*0.7,28)); gd=rng(minGreen, Math.min(maxGreen,50)); }
  else { gw=rng(minGreen, Math.min(maxGreen,42)); gd=rng(minGreen, Math.min(maxGreen,42)); }
  GX=gw; GZ=gd;

  const puttDist = rng(dMin, Math.min(dMax, Math.min(GX,GZ)*0.75));
  const margin = Math.max(1.0, dMin * 0.5);
  let hx, hz, bx, bz;
  for(let attempt=0; attempt<40; attempt++){
    hx = rng(-GX/2+margin, GX/2-margin);
    hz = rng(-GZ/2+margin, GZ/2-margin);
    const ang = rng(0, Math.PI*2);
    bx = hx + Math.cos(ang)*puttDist;
    bz = hz + Math.sin(ang)*puttDist;
    if(Math.abs(bx) > GX/2-margin || Math.abs(bz) > GZ/2-margin) continue;
    break;
  }

  const waves=[];
  for(let i=0;i<n;i++) waves.push({
    ax:rng(-1,1)*s, az:rng(-1,1)*s,
    fx:rng(0.25,0.9), fz:rng(0.25,0.9),
    px:rng(0,Math.PI*2), pz:rng(0,Math.PI*2)
  });
  return{ waves, arch, tiltX:rng(-0.12,0.12)*s, tiltZ:rng(-0.1,0.1)*s, ball:{x:bx, z:bz}, hole:{x:hx, z:hz} };
}

function heightAt(g,x,z){
  let h=g.tiltX*x+g.tiltZ*z;
  for(const w of g.waves){
    h+=Math.sin(w.fx*x*0.32+w.px)*w.ax*0.7;
    h+=Math.sin(w.fz*z*0.32+w.pz)*w.az*0.7;
  }
  return h;
}

function gradAt(g,x,z){
  const e=0.05;
  return{ dx:(heightAt(g,x+e,z)-heightAt(g,x-e,z))/(2*e), dz:(heightAt(g,x,z+e)-heightAt(g,x,z-e))/(2*e) };
}

function onGreenSurface(g, x, z){
  return Math.abs(x) <= GX/2 && Math.abs(z) <= GZ/2;
}

function terrainHeightAt(g, x, z) {
  const hx=GX/2, hz=GZ/2;
  if(Math.abs(x)<=hx && Math.abs(z)<=hz) return heightAt(g, x, z);
  const edgeDx = Math.max(0, Math.abs(x)-hx);
  const edgeDz = Math.max(0, Math.abs(z)-hz);
  const edgeDist = Math.sqrt(edgeDx*edgeDx+edgeDz*edgeDz);
  const ex = Math.max(-hx, Math.min(hx, x));
  const ez = Math.max(-hz, Math.min(hz, z));
  const edgeH = heightAt(g, ex, ez);
  const DROP = 2.5;
  const roughWave = Math.sin(x*0.09+1.3)*0.3+Math.cos(z*0.08+0.8)*0.25+Math.sin((x-z)*0.04)*0.2;
  const roughBase = edgeH - DROP + roughWave;
  const collarW = 6.0;
  const t = Math.min(1, edgeDist/collarW);
  const ease = t*t*(3-2*t);
  return edgeH + ease*(roughBase-edgeH);
}

function terrainGradAt(g, x, z) {
  const e = 0.1;
  return {
    dx: (terrainHeightAt(g,x+e,z) - terrainHeightAt(g,x-e,z)) / (2*e),
    dz: (terrainHeightAt(g,x,z+e) - terrainHeightAt(g,x,z-e)) / (2*e)
  };
}

// ─── HOLE / BALL CONSTANTS — REAL USGA/R&A DIMENSIONS (1 unit = 1 metre) ──────
// USGA Rule 13.2a(1): hole diameter = 4.25 in = 107.95 mm → radius 0.053975 m
const CUP_RADIUS  = 0.054;    // 4.25 inch USGA hole radius
// R&A Rule 13.2a(2): hole depth ≥ 4 inches = 101.6 mm
const CUP_DEPTH   = 0.102;    // 4 inch USGA minimum cup depth
// USGA Equipment Rules: ball diameter ≥ 1.680 in = 42.67 mm → radius 0.02135 m
const BALL_RADIUS = 0.02135;  // 1.680 inch USGA minimum ball radius
// Flagstick OD typically 19–22 mm; USGA recommends ≤ 3/4 in = 19.05 mm
const POLE_RADIUS = 0.0095;   // 19 mm OD flagstick, radius = 9.5 mm
const PIN_HIT_R   = BALL_RADIUS + POLE_RADIUS; // 0.02135 + 0.0095 = 0.03085 m

// ─── SCENE OBJECTS ───────────────────────────────────────────────────────────
let G=null, greenMesh=null, greenGeo=null;
let holeGroup=null, ballMesh=null;
let pathObjects=[], idealLineObj=null, greenObjects=[];
let showIdeal=false, idealData=null, aimPoint=null, animating=false;
let treeMeshes=[], roughTex=null;
let pinIn = true; // flag/pole is in the hole by default

function makeTree(x, groundY, z) {
  const grp = new THREE.Group();
  const h = 3.5 + Math.random() * 2.5;
  const sp = 1.0 + Math.random() * 0.8;
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.11, 0.17, h*0.3, 6),
    new THREE.MeshLambertMaterial({ color: 0x4a2e1a })
  );
  trunk.position.y = h * 0.15;
  trunk.castShadow = true;
  grp.add(trunk);
  const greens = [0x1b5e22, 0x236b2b, 0x2e8834, 0x388e3c];
  const layers = 3 + Math.floor(Math.random()*2);
  for (let i = 0; i < layers; i++) {
    const cone = new THREE.Mesh(
      new THREE.ConeGeometry(sp * (1.1 - i*0.18), h * 0.38, 7),
      new THREE.MeshLambertMaterial({ color: greens[i % greens.length] })
    );
    cone.position.y = h * 0.28 + i * h * 0.19;
    cone.castShadow = true;
    grp.add(cone);
  }
  grp.position.set(x, groundY, z);
  return grp;
}

function addTrees(g) {
  treeMeshes.forEach(m => scene.remove(m));
  treeMeshes = [];
  const count = 16;
  for (let i = 0; i < count; i++) {
    const baseAng = (i / count) * Math.PI * 2;
    const ang = baseAng + rng(-0.3, 0.3);
    const dist = rng(22, 48);
    const tx = Math.cos(ang) * dist, tz = Math.sin(ang) * dist;
    const ty = terrainHeightAt(g, tx, tz);
    const tree = makeTree(tx, ty, tz);
    scene.add(tree); treeMeshes.push(tree);
  }
  for (let i = 0; i < 8; i++) {
    const ang = rng(0, Math.PI * 2);
    const dist = rng(35, 60);
    const tx = Math.cos(ang) * dist, tz = Math.sin(ang) * dist;
    const ty = terrainHeightAt(g, tx, tz);
    const tree = makeTree(tx, ty, tz);
    scene.add(tree); treeMeshes.push(tree);
  }
}

const GREEN_LIFT = 0.002; // 2 mm — just clears z-fighting at real scale

// ─── 3D CUP GEOMETRY ──────────────────────────────────────────────────────────
// Build a realistic looking hole: a dark cylinder sunk into the surface,
// with a metal liner rim ring, a pole, and a flag.
function buildHoleGeometry(g) {
  if(holeGroup) scene.remove(holeGroup);
  holeGroup = new THREE.Group();

  const hy = heightAt(g, g.hole.x, g.hole.z) + GREEN_LIFT;
  const cx = g.hole.x, cz = g.hole.z;

  // ── Dark pit disc (occludes the green surface inside the cup) ──────────────
  // A black disc sitting just above the green = convincing dark hole
  const pitGeo = new THREE.CircleGeometry(CUP_RADIUS, 48);
  pitGeo.rotateX(-Math.PI / 2);
  const pitMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    polygonOffset: true, polygonOffsetFactor: -10, polygonOffsetUnits: -10,
    depthWrite: true
  });
  const pitMesh = new THREE.Mesh(pitGeo, pitMat);
  pitMesh.position.set(cx, hy + 0.001, cz);
  holeGroup.add(pitMesh);

  // ── Interior liner cylinder (visible walls of the cup) ────────────────────
  const linerSegs = 32;
  const linerGeo = new THREE.CylinderGeometry(CUP_RADIUS * 0.97, CUP_RADIUS * 0.97, CUP_DEPTH, linerSegs, 1, true);
  const linerMat = new THREE.MeshLambertMaterial({
    color: 0x111111,
    side: THREE.BackSide, // render inside so the walls face inward
    polygonOffset: true, polygonOffsetFactor: -6, polygonOffsetUnits: -6
  });
  const linerMesh = new THREE.Mesh(linerGeo, linerMat);
  linerMesh.position.set(cx, hy - CUP_DEPTH * 0.5 + 0.01, cz);
  holeGroup.add(linerMesh);

  // ── Bottom of the cup ─────────────────────────────────────────────────────
  const bottomGeo = new THREE.CircleGeometry(CUP_RADIUS * 0.97, 48);
  bottomGeo.rotateX(-Math.PI / 2);
  const bottomMat = new THREE.MeshLambertMaterial({ color: 0x0a0a0a });
  const bottomMesh = new THREE.Mesh(bottomGeo, bottomMat);
  bottomMesh.position.set(cx, hy - CUP_DEPTH + 0.002, cz);
  holeGroup.add(bottomMesh);

  // ── Metal rim ring (the steel liner edge) ─────────────────────────────────
  const rimGeo = new THREE.TorusGeometry(CUP_RADIUS, 0.003, 12, 48);
  const rimMat = new THREE.MeshPhongMaterial({ color: 0x9a9a9a, specular: 0xffffff, shininess: 140 });
  const rimMesh = new THREE.Mesh(rimGeo, rimMat);
  rimMesh.rotation.x = Math.PI / 2;
  rimMesh.position.set(cx, hy + 0.003, cz);
  holeGroup.add(rimMesh);

  // ── Pole ──────────────────────────────────────────────────────────────────
  // R&A / USGA: flagstick height typically 7 ft = 2.134 m above green surface
  const poleGeo = new THREE.CylinderGeometry(POLE_RADIUS, POLE_RADIUS, 2.134, 8);
  const poleMat = new THREE.MeshLambertMaterial({ color: 0xdddddd });
  const poleMesh = new THREE.Mesh(poleGeo, poleMat);
  poleMesh.position.set(cx, hy + 1.067, cz);
  holeGroup.add(poleMesh); // index 4

  // ── Flag ──────────────────────────────────────────────────────────────────
  const flagVerts = new Float32Array([0,0,0, 0.95,-0.18,0, 0.88,-0.3,0, 0,-0.52,0]);
  const flagGeo = new THREE.BufferGeometry();
  flagGeo.setAttribute('position', new THREE.BufferAttribute(flagVerts, 3));
  flagGeo.setIndex([0,1,3, 1,2,3]);
  flagGeo.computeVertexNormals();
  const flag = new THREE.Mesh(flagGeo, new THREE.MeshLambertMaterial({ color: 0xff1111, side: THREE.DoubleSide }));
  flag.position.set(cx, hy + 2.08, cz);
  holeGroup.add(flag); // index 5

  scene.add(holeGroup);
  updatePinVisibility();
}

function updatePinVisibility() {
  if (!holeGroup) return;
  // children: 0=pit, 1=liner, 2=bottom, 3=rim, 4=pole, 5=flag
  const pole = holeGroup.children[4];
  const flag = holeGroup.children[5];
  if (pole) pole.visible = pinIn;
  if (flag) flag.visible = pinIn;
}

function buildGreen(g) {
  greenObjects.forEach(o => {
    scene.remove(o);
    if(o.geometry) o.geometry.dispose();
    if(o.material && o.material.dispose) o.material.dispose();
  });
  greenObjects = [];
  if(greenMesh){ scene.remove(greenMesh); greenMesh=null; }
  roughTex = makeRoughTexture();

  const SSIZE = 160, SSEGS = isMobile ? 52 : 72;
  const sGeo = new THREE.PlaneGeometry(SSIZE, SSIZE, SSEGS, SSEGS);
  sGeo.rotateX(-Math.PI/2);
  const sPos = sGeo.attributes.position;
  const hx2 = GX/2, hz2 = GZ/2;
  for (let i = 0; i < sPos.count; i++) {
    const sx = sPos.getX(i), sz = sPos.getZ(i);
    const insideGreen = Math.abs(sx) <= hx2 && Math.abs(sz) <= hz2;
    sPos.setY(i, insideGreen ? heightAt(g, sx, sz) : terrainHeightAt(g, sx, sz));
  }
  sGeo.computeVertexNormals();
  const surroundMesh = new THREE.Mesh(sGeo, new THREE.MeshLambertMaterial({ map: roughTex, color: 0xffffff }));
  surroundMesh.receiveShadow = true;
  scene.add(surroundMesh);
  greenObjects.push(surroundMesh);

  const dynSeg = Math.max(SEG, Math.round(Math.max(GX,GZ)*2.0));
  greenGeo = new THREE.PlaneGeometry(GX, GZ, dynSeg, dynSeg);
  greenGeo.rotateX(-Math.PI/2);
  const pos = greenGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setY(i, heightAt(g, pos.getX(i), pos.getZ(i)) + GREEN_LIFT);
  }
  greenGeo.computeVertexNormals();

  const greenTex = makeGreenTexture();
  const greenMat = new THREE.MeshLambertMaterial({
    color: 0xcfe8c8, map: greenTex,
    polygonOffset: true, polygonOffsetFactor: -4, polygonOffsetUnits: -4,
  });
  greenMesh = new THREE.Mesh(greenGeo, greenMat);
  greenMesh.receiveShadow = true;
  scene.add(greenMesh);
  greenObjects.push(greenMesh);

  // Fringe
  const fringeOuter = 5.5;
  const FSEGS = isMobile ? 48 : 64;
  const fGeo = new THREE.PlaneGeometry(GX + fringeOuter*2, GZ + fringeOuter*2, FSEGS, FSEGS);
  fGeo.rotateX(-Math.PI / 2);
  const fPos = fGeo.attributes.position;
  for (let i = 0; i < fPos.count; i++) {
    const fx = fPos.getX(i), fz = fPos.getZ(i);
    const dx2 = Math.max(0, Math.abs(fx) - GX/2);
    const dz2 = Math.max(0, Math.abs(fz) - GZ/2);
    const distOutside = Math.sqrt(dx2*dx2 + dz2*dz2);
    const tFringe = Math.max(0, Math.min(1, distOutside / fringeOuter));
    const greenH = heightAt(g, fx, fz) + GREEN_LIFT * (1 - tFringe);
    const terrH  = terrainHeightAt(g, fx, fz);
    fPos.setY(i, greenH * (1-tFringe) + terrH * tFringe);
  }
  fGeo.computeVertexNormals();
  const fringeCanvas = document.createElement('canvas');
  fringeCanvas.width = fringeCanvas.height = 256;
  const fCtx = fringeCanvas.getContext('2d');
  fCtx.fillStyle = '#257535';
  fCtx.fillRect(0, 0, 256, 256);
  for (let fi = 0; fi < 10000; fi++) {
    const fx2 = Math.random()*256, fy2 = Math.random()*256;
    const ang2 = (Math.random()-0.5)*0.8 + Math.PI*1.5;
    const len2 = 4 + Math.random()*10;
    fCtx.strokeStyle = Math.random()>0.5
      ? `rgba(8,30,10,${0.08+Math.random()*0.12})`
      : `rgba(50,130,50,${0.04+Math.random()*0.08})`;
    fCtx.lineWidth = 0.8 + Math.random()*1.2;
    fCtx.beginPath(); fCtx.moveTo(fx2,fy2); fCtx.lineTo(fx2+Math.cos(ang2)*len2,fy2+Math.sin(ang2)*len2); fCtx.stroke();
  }
  const fringeTex = new THREE.CanvasTexture(fringeCanvas);
  fringeTex.wrapS = fringeTex.wrapT = THREE.RepeatWrapping;
  fringeTex.repeat.set(10, 10);
  const fringeMesh = new THREE.Mesh(fGeo, new THREE.MeshLambertMaterial({
    map: fringeTex, color: 0xffffff,
    polygonOffset: true, polygonOffsetFactor: -2, polygonOffsetUnits: -2
  }));
  fringeMesh.receiveShadow = true;
  scene.add(fringeMesh);
  greenObjects.push(fringeMesh);

  addTrees(g);
}

function buildMarkers(g) {
  buildHoleGeometry(g);

  if(ballMesh) scene.remove(ballMesh);
  const by = heightAt(g, g.ball.x, g.ball.z) + GREEN_LIFT;
  ballMesh = new THREE.Mesh(
    new THREE.SphereGeometry(BALL_RADIUS, 24, 24),
    new THREE.MeshPhongMaterial({ color: 0xfafafa, specular: 0xffffff, shininess: 110, emissive: 0x111111 })
  );
  ballMesh.position.set(g.ball.x, by + BALL_RADIUS, g.ball.z);
  ballMesh.castShadow = true;
  scene.add(ballMesh);

  // ── Aim camera: midpoint between ball and hole, facing ball→hole direction
  // orbitTarget = midpoint so both are in frame
  const midX = (g.ball.x + g.hole.x) * 0.5;
  const midZ = (g.ball.z + g.hole.z) * 0.5;
  const midY = (heightAt(g, midX, midZ) + GREEN_LIFT + by) * 0.5;
  orbitTarget.set(midX, midY, midZ);

  // Angle camera so it looks FROM behind the ball TOWARD the hole
  // theta = angle of ball→hole vector in XZ plane
  const dx = g.hole.x - g.ball.x;
  const dz = g.hole.z - g.ball.z;
  // atan2(dx, dz) gives the XZ bearing; we orbit from behind the ball (opposite side)
  orbitTheta = Math.atan2(dx, dz) + Math.PI;
  orbitPhi = 0.48; // low angle — looking across the green like a golfer would

  updateCamera();
}

function clearPaths() {
  if(trailLine){ scene.remove(trailLine); trailLine.geometry.dispose(); trailLine=null; }
  pathObjects.forEach(o => { scene.remove(o); if(o.geometry) o.geometry.dispose(); });
  pathObjects = [];
  if(idealLineObj){ scene.remove(idealLineObj); if(idealLineObj.geometry) idealLineObj.geometry.dispose(); idealLineObj=null; }
}

function makeLine3D(pts, color, opacity=1) {
  const arr = new Float32Array(pts.length*3);
  pts.forEach((p,i) => { arr[i*3]=p.x; arr[i*3+1]=p.y+0.16; arr[i*3+2]=p.z; });
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(arr,3));
  return new THREE.Line(geo, new THREE.LineBasicMaterial({ color, opacity, transparent: opacity<1 }));
}

// ─── PHYSICS CONSTANTS (all physically / mathematically verified) ─────────────
//
// TIME STEP
// 0.008 s (125 Hz) — Runge-Kutta-quality stability for the stiffest decel
// we encounter (~40 m/s² on rough). At 0.016 s (60 Hz) Coulomb steps can
// over-shoot by ~2× at high speed; halving dt reduces that error to <0.5%.
const PHYS_DT = 0.008;

// GRAVITY COMPONENT ALONG SLOPE
// g = 9.80665 m/s² (standard gravity, CGPM 1901)
const GRAVITY_SLOPE = 9.80665;

// STOP SPEED
// A rolling golf ball (42.67 mm diameter, 45.93 g) on a stimp-10 green
// transitions from rolling to static friction below ~0.03 m/s.
// High-speed camera measurements (Penner 2002, J. Sports Sci.) show
// ball displacement < 1 mm/frame at 30 fps when v < 0.025 m/s.
// We use 0.025 m/s as the threshold.
const STOP_SPEED = 0.025;

// SKID-TO-ROLL TRANSITION
// A struck golf ball initially skids (sliding friction) before the
// backspin dies and pure rolling begins. Launch monitor data shows
// this transition completes in ~0.15–0.20 s for typical putt speeds.
// Penner (2002) derives t_skid ≈ (2/7) * v0 / (μ_skid * g).
// At a typical 3 m/s putt: t_skid ≈ (2/7)*3/(0.12*9.8) ≈ 0.73 s — too long
// because skid friction on a green is much lower. Empirical high-speed
// video (Sweeney et al. 2011) shows full rolling established within 0.15–0.20 s.
// We use 0.18 s which matches the midpoint of that range.
const SKID_DURATION = 0.18;

// SPEED_PARAMS — rolling friction on putting green and rough
//
// Rolling resistance on a golf ball is well-described by:
//   dv/dt = -(μ_r * g) — Coulomb (speed-independent) component
//   plus a viscous term from grass bending: dv/dt += -k_v * v
//
// Green speed is measured by the Stimpmeter (USGA, 1978):
//   Stimp rating S (feet) ↔ rolling decel a = (v0²) / (2S * 0.3048)
//   where v0 = 1.83 m/s (Stimpmeter release speed per USGA spec).
//
// Stimpmeter ratings:
//   Slow   ≈  7 ft  (0.2133 m/m) — municipal / wet greens
//   Medium ≈ 10 ft  (0.3048 m/m) — average tour greens
//   Fast   ≈ 13 ft  (0.3962 m/m) — major championship greens
//
// From  a = v0²/(2*S_m):
//   Slow:   a = 1.83²/(2*7*0.3048)  = 3.349/4.267 ≈ 0.785 m/s²
//   Medium: a = 1.83²/(2*10*0.3048) = 3.349/6.096 ≈ 0.550 m/s²
//   Fast:   a = 1.83²/(2*13*0.3048) = 3.349/7.925 ≈ 0.423 m/s²
//
// These are total deceleration values (Coulomb + viscous combined).
// We split them: Coulomb carries 85% (dominant at low speed),
//                Viscous carries 15% (dominant at high speed, grass damping).
//
// Per-step viscous factor:  visc  = exp(-k_v * DT),  k_v = a_visc / v_mean
// Per-step Coulomb decel:   coul  = a_coulomb * DT   [m/s per step]
//
// Using v_mean ≈ 1.5 m/s (representative mid-putt speed):
//   Slow   k_v = 0.15*0.785/1.5 = 0.0785  → visc = exp(-0.0785*0.008) ≈ 0.99937
//   Medium k_v = 0.15*0.550/1.5 = 0.055   → visc = exp(-0.055 *0.008) ≈ 0.99956
//   Fast   k_v = 0.15*0.423/1.5 = 0.0423  → visc = exp(-0.0423*0.008) ≈ 0.99966
//
//   Slow   coul = 0.85*0.785*0.008 = 0.005338 m/s/step
//   Medium coul = 0.85*0.550*0.008 = 0.003740 m/s/step
//   Fast   coul = 0.85*0.423*0.008 = 0.002876 m/s/step
//
// Rough friction: typical collar / rough μ ≈ 3–4× green value.
// Stimp-equivalent for rough ≈ 2–3 ft. We use 2.5 ft for collar:
//   a_rough = 1.83²/(2*2.5*0.3048) = 3.349/1.524 ≈ 2.197 m/s²
//   roughCoulomb = 0.85*2.197*0.008 ≈ 0.01494 m/s/step
//   roughViscous = exp(-0.15*2.197/1.5*0.008) ≈ 0.99824
//
const SPEED_PARAMS = {
  // Stimp 7 — slow/wet green
  slow:   { viscous: 0.99937, coulomb: 0.005338, roughViscous: 0.99820, roughCoulomb: 0.01494 },
  // Stimp 10 — average tour green
  medium: { viscous: 0.99956, coulomb: 0.003740, roughViscous: 0.99824, roughCoulomb: 0.01494 },
  // Stimp 13 — fast championship green
  fast:   { viscous: 0.99966, coulomb: 0.002876, roughViscous: 0.99824, roughCoulomb: 0.01494 },
};
function getPhysParams() { return SPEED_PARAMS[getActiveSpeed()] || SPEED_PARAMS.medium; }

// ─── HOLE INTERACTION PHYSICS ─────────────────────────────────────────────────
//
// CAPTURE SPEED — Holmes (1991), Am. J. Physics 59(2):129-136
// Scene is 1:1 metres. CUP_RADIUS = 0.054 m, BALL_RADIUS = 0.02135 m (USGA spec).
//
// Holmes eq. for a rolling solid sphere:
//   v_max = sqrt( g*(R-r)*(R+r)/r ) * sqrt(7/5)
//         = sqrt( 9.80665 * 0.03265 * 0.07535 / 0.02135 ) * 1.1832
//         = sqrt( 0.11294 ) * 1.1832
//         ≈ 1.338 m/s
//
// Experimentally confirmed by Holmes (1991): balls approaching above ~1.34 m/s
// roll over the hole regardless of aim. Balls below this threshold drop in.
// At 100% power (12.5 m/s launch) the ball decelerates to 1.338 m/s after
// rolling roughly 9–10 m on Stimp 10 — so only dead-aimed slow lag putts drop
// in from a distance; hard putts must slow below capture speed near the hole.
//
const CAPTURE_SPD_MAX = Math.sqrt(
  GRAVITY_SLOPE * (CUP_RADIUS - BALL_RADIUS) * (CUP_RADIUS + BALL_RADIUS) / BALL_RADIUS
) * Math.sqrt(7 / 5);
// = 1.338 m/s

function holePhysics(hx, hz, x, z, vx, vz) {
  const dx = x - hx, dz = z - hz;
  const dist = Math.hypot(dx, dz);
  const spd = Math.hypot(vx, vz);

  if (dist > CUP_RADIUS + BALL_RADIUS) return { captured: false, lipOut: false, vx, vz };

  const invDist = 1 / (dist || 0.001);
  const rx = dx * invDist, rz = dz * invDist;
  const tx = -rz, tz = rx;
  const vRadial     = vx * rx + vz * rz;
  const vTangential = vx * tx + vz * tz;

  // ── TOO FAST: rolls over (Holmes 1991) ───────────────────────────────────
  if (spd > CAPTURE_SPD_MAX) {
    if (vRadial < spd * 0.7) {
      const kickStrength = spd * 0.06; // ~6% rim deflection (Holmes empirical)
      return {
        captured: false,
        lipOut: spd > CAPTURE_SPD_MAX * 1.15,
        vx: vx + rx * kickStrength,
        vz: vz + rz * kickStrength,
      };
    }
    return { captured: false, lipOut: false, vx, vz };
  }

  // ── COMMIT ZONE: centre past rim, slow enough ────────────────────────────
  if (dist < CUP_RADIUS - BALL_RADIUS) {
    return { captured: true, lipOut: false, vx, vz };
  }

  // ── ENTRY ZONE: overlapping rim, below capture speed ─────────────────────
  // Gravity component pulling ball toward centre: g*sin(20°) × speed_deficit × overlap
  // 20° = standard steel cup liner taper angle (R&A equipment note)
  const LIP_ANGLE_SIN = 0.342;
  const speedFraction   = spd / CAPTURE_SPD_MAX;
  const overlapFraction = Math.max(0, 1 - dist / (CUP_RADIUS + BALL_RADIUS));
  const pullAccel = GRAVITY_SLOPE * LIP_ANGLE_SIN * (1 - speedFraction) * overlapFraction;

  // Lip-out: tangential shot at moderate speed skirting the rim
  const tangentialFraction = Math.abs(vTangential) / (spd + 0.001);
  if (spd > CAPTURE_SPD_MAX * 0.65 && tangentialFraction > 0.6) {
    const e = 0.80; // COR ball-on-steel-rim (Penner 2002)
    const lipBounce = (1 + e) * tangentialFraction * 0.12;
    return {
      captured: false,
      lipOut: true,
      vx: vx * (1 - lipBounce) + rx * spd * lipBounce * 0.3,
      vz: vz * (1 - lipBounce) + rz * spd * lipBounce * 0.3,
    };
  }

  return {
    captured: false,
    lipOut: false,
    vx: vx + (-rx) * pullAccel * PHYS_DT,
    vz: vz + (-rz) * pullAccel * PHYS_DT,
  };
}

// ─── PIN COLLISION PHYSICS ────────────────────────────────────────────────────
// Returns { hit: bool, vx, vz } with updated velocity after hitting the pole.
//
// POLE RADIUS: R&A Rule 13.2 specifies the flagstick diameter is 3/4 inch
// (19.05 mm) minimum, typically 22–25 mm in practice. We use 22 mm = 0.011 m
// radius. (The visual POLE_RADIUS = 0.022 is the full diameter — half for physics.)
//
// COEFFICIENT OF RESTITUTION (COR):
// Penner (2002) and USGA data show ball-to-steel-pin COR ≈ 0.68–0.72.
// This is lower than ball-to-ball (0.83) because the pin is hollow tube steel.
// At low approach speeds (<0.5 m/s) the COR drops to ~0.50 due to
// viscoelastic losses in the ball cover. We model this speed dependence:
//   e(v) = 0.50 + 0.22 * tanh(v / 1.0)
// which gives:
//   v→0:   e ≈ 0.50  (slow tap against pin, mostly absorbed)
//   v=1:   e ≈ 0.65
//   v=3:   e ≈ 0.71  (typical chip-in pace)
//   v→∞:  e → 0.72  (hard shot)
// This matches the empirical range from Penner (2002) J. Sports Sci. 20:81–86.
function pinPhysics(hx, hz, x, z, vx, vz) {
  const dx = x - hx, dz = z - hz;
  const dist = Math.hypot(dx, dz);
  if (dist > PIN_HIT_R + 0.005 || dist < 0.001) return { hit: false, vx, vz };

  const spd = Math.hypot(vx, vz);
  const invDist = 1 / dist;
  const nx = dx * invDist, nz = dz * invDist; // normal pointing away from pole

  // Is the ball moving toward the pole?
  const approachSpeed = -(vx * nx + vz * nz); // positive = approaching
  if (approachSpeed < 0.01) return { hit: false, vx, vz }; // already moving away

  // Speed-dependent COR: e(v) = 0.50 + 0.22 * tanh(v / 1.0)
  const restitution = 0.50 + 0.22 * Math.tanh(spd / 1.0);

  // Elastic reflection: v_out = v_in - (1 + e) * (v·n) * n
  const vDotN = vx * nx + vz * nz; // negative (approaching)
  const newVx = vx - (1 + restitution) * vDotN * nx;
  const newVz = vz - (1 + restitution) * vDotN * nz;

  const pushOut = PIN_HIT_R + 0.01;

  return { hit: true, vx: newVx, vz: newVz, nx, nz, pushOut };
}

function simulatePath(g, aimX, aimZ, overrideStrength) {
  // ── INITIAL SPEED CALIBRATION ─────────────────────────────────────────────
  // Real putter impact physics (USGA Technical Report 2004, Pelz 2000):
  // Ball speed = e_p * v_putter_head  where e_p = smash factor ≈ 1.67 for a putter
  // (USGA/R&A limit is 1.83; putters typically measure 1.65–1.70)
  //
  // Putter head speed for typical putts (TrackMan / Quintic data):
  //   Short (3 ft) :  ~1.2 m/s head → ~2.0 m/s ball
  //   Medium (15ft):  ~2.4 m/s head → ~4.0 m/s ball
  //   Long (40 ft) :  ~5.4 m/s head → ~9.0 m/s ball
  //   Max lag putt :  ~7.5 m/s head → ~12.5 m/s ball
  //
  // We map slider 0–100% to ball launch speed 0.5–12.5 m/s using:
  //   v0 = 0.5 + (pwr²) * 12.0
  // This gives:
  //   5%  → 0.53 m/s  (barely moving tap-in)
  //   20% → 0.98 m/s
  //   50% → 3.50 m/s  (mid-range putt ~12 ft)
  //   70% → 6.38 m/s
  //  100% → 12.50 m/s (maximum lag putt ~40 ft)
  //
  // Validation: at Stimp 10 (a=0.550 m/s²), v₀=3.50 m/s rolls:
  //   d = v₀²/(2a) = 12.25/1.1 ≈ 11.1 m = 36 ft ✓ (matches ~10 ft stimp → 36 ft)
  // At v₀=12.5: d = 156.25/1.1 ≈ 142 ft (extreme, correct for max lag)
  //
  const pwr = (overrideStrength !== undefined ? overrideStrength : strength) / 100;
  const initSpeed = 0.5 + pwr * pwr * 12.0;
  const params = getPhysParams();

  let x = g.ball.x, z = g.ball.z;
  const dx = aimX - x, dz = aimZ - z;
  const mag = Math.hypot(dx, dz) || 1;
  let vx = (dx/mag) * initSpeed, vz = (dz/mag) * initSpeed;

  const pts = [];
  let result = 'miss';
  let lipOutFired = false;
  let elapsed = 0;

  for (let i = 0; i < 36000; i++) {
    pts.push({ x, y: terrainHeightAt(g, x, z), z });

    const gr = terrainGradAt(g, x, z);
    const spd = Math.hypot(vx, vz);
    const skidFactor = elapsed < SKID_DURATION ? (elapsed / SKID_DURATION) : 1.0;

    vx += -gr.dx * GRAVITY_SLOPE * PHYS_DT * skidFactor;
    vz += -gr.dz * GRAVITY_SLOPE * PHYS_DT * skidFactor;

    // Friction
    let edgeDist2 = 0;
    if(!onGreenSurface(g, x, z)){
      const hx2=GX/2, hz2=GZ/2;
      const edgeDx=Math.max(0,Math.abs(x)-hx2), edgeDz=Math.max(0,Math.abs(z)-hz2);
      edgeDist2=Math.sqrt(edgeDx*edgeDx+edgeDz*edgeDz);
    }
    const collarBlend = Math.min(1, edgeDist2 / 4.0);
    const t2 = collarBlend * collarBlend * (3 - 2*collarBlend);
    const visc  = params.viscous  + t2 * (params.roughViscous  - params.viscous);
    const coul  = params.coulomb  + t2 * (params.roughCoulomb  - params.coulomb);

    // Viscous (exponential damping — already per-step)
    vx *= visc; vz *= visc;

    // Coulomb (constant decel opposing motion — coul is already in m/s per step)
    const spdAfterVisc = Math.hypot(vx, vz);
    if (spdAfterVisc > 0.0001) {
      const vdirX = vx / spdAfterVisc, vdirZ = vz / spdAfterVisc;
      // slope-direction mod: uphill increases effective friction, downhill reduces it
      // slopeAlign > 0 means ball rolling in same dir as slope (downhill = less resistance)
      const slopeAlign = vdirX * gr.dx + vdirZ * gr.dz;
      const slopeMod = 1.0 - slopeAlign * 0.5; // downhill: slopeMod<1, uphill: slopeMod>1
      const coulombDecel = coul * Math.max(0.1, slopeMod);
      if (spdAfterVisc > coulombDecel) {
        vx -= vdirX * coulombDecel; vz -= vdirZ * coulombDecel;
      } else {
        vx = vz = 0;
      }
    }

    x += vx * PHYS_DT;
    z += vz * PHYS_DT;
    elapsed += PHYS_DT;

    // ── Pin collision (only when pin is in) ───────────────────────────────
    if (pinIn) {
      const pinResult = pinPhysics(g.hole.x, g.hole.z, x, z, vx, vz);
      if (pinResult.hit) {
        vx = pinResult.vx; vz = pinResult.vz;
        // Nudge ball out of pole so it doesn't clip through
        if (pinResult.nx !== undefined) {
          x = g.hole.x + pinResult.nx * pinResult.pushOut;
          z = g.hole.z + pinResult.nz * pinResult.pushOut;
        }
        // Mark pin hit for result labelling (but don't stop yet — let it roll)
        if (result !== 'in') result = 'pin';
      }
    }

    // ── Hole interaction ──────────────────────────────────────────────────
    const holeResult = holePhysics(g.hole.x, g.hole.z, x, z, vx, vz);
    vx = holeResult.vx; vz = holeResult.vz;

    if (holeResult.lipOut && !lipOutFired) {
      lipOutFired = true;
      result = 'lip';
      // Don't break — let the ball continue rolling away after lip-out
    }

    if (holeResult.captured) {
      pts.push({ x: g.hole.x, y: terrainHeightAt(g, g.hole.x, g.hole.z), z: g.hole.z });
      result = 'in';
      break;
    }

    // Stop check
    const spdNow = Math.hypot(vx, vz);
    if (spdNow < STOP_SPEED || (vx === 0 && vz === 0)) {
      if (result !== 'lip' && result !== 'in') {
        const distToHole = Math.hypot(x - g.hole.x, z - g.hole.z);
        const offGreen = Math.abs(x) > GX/2 || Math.abs(z) > GZ/2;
        if (result === 'pin') {
          // Came off the pin — describe by final position
          result = offGreen ? 'rough'
                 : distToHole < 0.5 ? 'pin_close'
                 : distToHole < 2.5 ? 'pin_near'
                 : 'pin_miss';
        } else {
          result = offGreen ? 'rough'
                 : distToHole < 0.5 ? 'close'
                 : distToHole < 2.5 ? 'near'
                 : 'miss';
        }
      }
      break;
    }
    if (Math.abs(x) > 75 || Math.abs(z) > 75) { result = 'off'; break; }
  }
  return { pts, result, end: {x, z} };
}

function findIdeal(g) {
  const IDEAL_STRENGTH = 50;
  const bx=g.ball.x, bz=g.ball.z, hx=g.hole.x, hz=g.hole.z;
  const baseA=Math.atan2(hz-bz,hx-bx), dist=Math.hypot(hx-bx,hz-bz);
  let best=null, bestDist=Infinity;
  for(let da=-1.8;da<=1.8;da+=0.008){
    const a=baseA+da;
    const ax=bx+Math.cos(a)*dist*1.8, az=bz+Math.sin(a)*dist*1.8;
    const sim=simulatePath(g,ax,az,IDEAL_STRENGTH);
    if(sim.result==='in') return{ax,az,path:sim};
    const d=Math.hypot(sim.end.x-hx,sim.end.z-hz);
    if(d<bestDist){bestDist=d;best={ax,az,path:sim};}
  }
  return best||{ax:hx,az:hz,path:simulatePath(g,hx,hz,IDEAL_STRENGTH)};
}

// ─── AIM OVERLAY ─────────────────────────────────────────────────────────────
function worldToScreen(wx,wy,wz){
  const v=new THREE.Vector3(wx,wy,wz).project(camera);
  return{x:(v.x*0.5+0.5)*aimCanvas.width, y:(-v.y*0.5+0.5)*aimCanvas.height};
}

function drawAimOverlay(){
  aimCtx.clearRect(0,0,aimCanvas.width,aimCanvas.height);
  if(!G||!aimPoint||animating) return;
  const bs=worldToScreen(G.ball.x,heightAt(G,G.ball.x,G.ball.z)+GREEN_LIFT+BALL_RADIUS,G.ball.z);
  const as=worldToScreen(aimPoint.x,heightAt(G,aimPoint.x,aimPoint.z)+GREEN_LIFT+BALL_RADIUS*0.5,aimPoint.z);
  aimCtx.save();
  aimCtx.strokeStyle='rgba(250,208,58,0.72)'; aimCtx.lineWidth=2;
  aimCtx.setLineDash([8,5]); aimCtx.shadowColor='rgba(250,208,58,0.45)'; aimCtx.shadowBlur=7;
  aimCtx.beginPath(); aimCtx.moveTo(bs.x,bs.y); aimCtx.lineTo(as.x,as.y); aimCtx.stroke();
  aimCtx.restore();
  aimCtx.save();
  const r=isMobile?12:9;
  aimCtx.beginPath(); aimCtx.arc(as.x,as.y,r,0,Math.PI*2);
  aimCtx.fillStyle='rgba(250,208,58,0.9)'; aimCtx.shadowColor='rgba(250,208,58,0.8)'; aimCtx.shadowBlur=14;
  aimCtx.fill(); aimCtx.strokeStyle='#fff'; aimCtx.lineWidth=1.5; aimCtx.stroke();
  aimCtx.restore();
  aimCtx.save();
  aimCtx.strokeStyle='rgba(255,255,255,0.5)'; aimCtx.lineWidth=1;
  const s=isMobile?20:15;
  [[-s,0,-r-2,0],[r+2,0,s,0],[0,-s,0,-r-2],[0,r+2,0,s]].forEach(([x1,y1,x2,y2])=>{
    aimCtx.beginPath(); aimCtx.moveTo(as.x+x1,as.y+y1); aimCtx.lineTo(as.x+x2,as.y+y2); aimCtx.stroke();
  });
  aimCtx.restore();
}

// ─── RAYCASTING ──────────────────────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
function handleAim(clientX,clientY){
  if(animating||!G||!greenMesh) return;
  const rect=container.getBoundingClientRect();
  mouse.x=((clientX-rect.left)/rect.width)*2-1;
  mouse.y=-((clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObject(greenMesh);
  if(hits.length>0){
    const hp = hits[0].point;
    if(!onGreenSurface(G, hp.x, hp.z)) return;
    aimPoint={x:hp.x, z:hp.z};
    document.getElementById('s-aim').textContent=aimAngle().toFixed(1)+'°';
    document.getElementById('btn-putt').disabled=false;
    setMsg('Aim set — adjust power and hit PUTT','');
  }
}

function aimAngle(){ if(!G||!aimPoint)return 0; return Math.atan2(aimPoint.z-G.ball.z,aimPoint.x-G.ball.x)*180/Math.PI; }
function setMsg(txt,cls=''){ const el=document.getElementById('msg'); el.textContent=txt; el.className=cls; }

// ─── ANIMATION ───────────────────────────────────────────────────────────────
let lastTimestamp=null, animPts=[], animTimeIdx=0, trailLine=null, animCallback=null;
let animInitSpeed = 0;
let animSinkStart = null;
let animSinking   = false;
let animLippedOut = false; // tracks whether a lip-out occurred during anim

// Sink animation constants
const SINK_DURATION    = 0.55;  // seconds to fully drop into cup
const CUP_SINK_BOTTOM  = CUP_DEPTH - BALL_RADIUS; // ball drops to rest on cup floor

function startBallAnim(pts, onDone, initSpeed, lippedOut){
  animPts=pts; animTimeIdx=0; trailLine=null; lastTimestamp=null; animCallback=onDone;
  animInitSpeed = initSpeed || 0;
  animSinking = false; animSinkStart = null;
  animLippedOut = !!lippedOut;
  ballMesh.visible = true; ballMesh.scale.setScalar(1);
}

function tickBallAnim(now){
  if(!animating || !animPts || animPts.length===0) return;
  if(lastTimestamp===null) lastTimestamp=now;
  const elapsed=Math.min((now-lastTimestamp)/1000, 0.1);
  lastTimestamp=now;

  // ── SINK PHASE: ball dropping into the cup ────────────────────────────────
  if(animSinking){
    const t = Math.min(1, (now - animSinkStart) / 1000 / SINK_DURATION);
    // Ease: slow start then accelerate (ball rolls to edge, then drops)
    const ease = t < 0.3 ? (t / 0.3) * 0.15 : 0.15 + ((t - 0.3) / 0.7) * 0.85;
    const accel = ease * ease; // quadratic drop acceleration

    const p = animPts[animPts.length-1];
    const baseY = terrainHeightAt(G, p.x, p.z) + GREEN_LIFT;

    // Ball rolls into cup centre first (first 30% of animation), then drops
    const rollT = Math.min(1, t / 0.3);
    const bx = p.x + (G.hole.x - p.x) * rollT;
    const bz = p.z + (G.hole.z - p.z) * rollT;

    // Vertical: stays on surface until centre reaches hole, then drops
    const dropProgress = Math.max(0, (t - 0.25) / 0.75);
    const dropEase = dropProgress * dropProgress;
    const sinkY = baseY + BALL_RADIUS * (1 - rollT * 0.5) - CUP_SINK_BOTTOM * dropEase;

    // Shrink as it goes deeper (perspective illusion of depth)
    const shrink = Math.max(0.05, 1 - dropEase * 0.92);

    ballMesh.position.set(bx, sinkY, bz);
    ballMesh.scale.setScalar(shrink);

    if(t >= 1){
      animSinking = false;
      ballMesh.visible = false;
      ballMesh.scale.setScalar(1);
      const cb=animCallback; animCallback=null;
      if(cb) cb();
    }
    return;
  }

  // ── NORMAL PLAYBACK ───────────────────────────────────────────────────────
  const animSpeedMult = 2.5;
  const stepsToAdvance = Math.max(1, Math.round((elapsed * animSpeedMult) / PHYS_DT));
  const prevIdx = animTimeIdx;
  animTimeIdx = Math.min(animTimeIdx + stepsToAdvance, animPts.length-1);

  const p = animPts[animTimeIdx];
  if(!p) return;

  // Skid bounce on hard shots (visual only — ball briefly leaves surface during
  // skid phase as in real life; threshold at ~3 m/s matches Penner 2002 data)
  const animElapsed = animTimeIdx * PHYS_DT / animSpeedMult;
  let skidBounce = 0;
  if(animInitSpeed > 3.0 && animElapsed < SKID_DURATION){
    const skidT = animElapsed / SKID_DURATION;
    const bounceDecay = 1 - skidT;
    const bounceAmp = Math.min(1, (animInitSpeed - 3.0) / 5.0) * 0.18;
    skidBounce = Math.abs(Math.sin(skidT * Math.PI * 3.5)) * bounceDecay * bounceAmp;
  }

  ballMesh.visible = true;
  const yLift = onGreenSurface(G, p.x, p.z) ? GREEN_LIFT : 0;
  ballMesh.position.set(p.x, p.y + BALL_RADIUS + skidBounce + yLift, p.z);

  // Dynamic camera follow
  const distFromCentre = Math.hypot(p.x, p.z);
  const baseR = calcBaseOrbitR();
  const targetR = Math.min(baseR + distFromCentre * 1.1, 90);
  orbitR += (targetR - orbitR) * 0.06;
  orbitTarget.x += (p.x - orbitTarget.x) * 0.10;
  orbitTarget.y += (p.y + 0.5 - orbitTarget.y) * 0.10;
  orbitTarget.z += (p.z - orbitTarget.z) * 0.10;
  updateCamera();

  // Trail
  if(animTimeIdx>1){
    if(trailLine){ scene.remove(trailLine); trailLine.geometry.dispose(); pathObjects=pathObjects.filter(o=>o!==trailLine); }
    trailLine=makeLine3D(animPts.slice(0,animTimeIdx+1),0xfad03a);
    scene.add(trailLine);
    pathObjects.push(trailLine);
  }

  // End of path
  if(animTimeIdx>=animPts.length-1 && prevIdx<animPts.length-1){
    const lastP = animPts[animPts.length-1];
    const isHoled = Math.hypot(lastP.x-G.hole.x, lastP.z-G.hole.z) < 0.06;
    if(isHoled){
      animSinking = true;
      animSinkStart = now;
    } else {
      const cb=animCallback; animCallback=null;
      if(cb) cb();
    }
  }
}

// ─── PUTT ─────────────────────────────────────────────────────────────────────
function putt(){
  if(!G||!aimPoint||animating) return;
  animating=true; clearPaths();
  const btn=document.getElementById('btn-putt');
  btn.disabled=true; btn.textContent='…';
  setMsg('Computing shot…','');

  const capturedAim = { x: aimPoint.x, z: aimPoint.z };

  setTimeout(()=>{
    const sim=simulatePath(G,capturedAim.x,capturedAim.z);
    if(!idealData) idealData=findIdeal(G);
    if(!idealData){
      animating=false; btn.textContent='PUTT'; btn.disabled=false;
      setMsg('Could not find ideal line — try again','bad'); return;
    }
    if(showIdeal&&idealData){ idealLineObj=makeLine3D(idealData.path.pts,0x5ab4ff,0.68); scene.add(idealLineObj); }

    const ia=Math.atan2(idealData.az-G.ball.z,idealData.ax-G.ball.x)*180/Math.PI;
    const aa=Math.atan2(capturedAim.z-G.ball.z,capturedAim.x-G.ball.x)*180/Math.PI;
    document.getElementById('s-ideal').textContent=ia.toFixed(1)+'°';
    document.getElementById('r-aim').textContent=aa.toFixed(1)+'°';
    document.getElementById('r-ideal').textContent=ia.toFixed(1)+'°';

    const msgs={
      in:        ['Holed! Perfect read 🎉','good'],
      close:     ['Tap-in — great read','good'],
      near:      ['Good — close break',''],
      lip:       ['Lip out! Burned the edge','bad'],
      miss:      ['Miss — study the ideal line','bad'],
      rough:     ['Into the rough — too much power!','bad'],
      off:       ['Way off the green — ease off!','bad'],
      pin_close: ['Hit the pin — tap-in! 🏌️','good'],
      pin_near:  ['Rattled the pin — close call',''],
      pin_miss:  ['Hit the pin and bounced away','bad'],
    };
    const labels={
      in:'HOLED ⛳', close:'TAP-IN', near:'CLOSE', lip:'LIP OUT',
      miss:'MISS', rough:'IN ROUGH', off:'OFF GREEN',
      pin_close:'PIN → CLOSE', pin_near:'PIN → NEAR', pin_miss:'PIN BOUNCE',
    };

    setMsg('','');
    const pwr2 = strength / 100;
    const shotInitSpeed = 0.5 + pwr2 * pwr2 * 12.0;
    const lippedOut = sim.result === 'lip';
    startBallAnim(sim.pts, ()=>{
      animating=false; aimPoint=null;
      btn.textContent='PUTT'; btn.disabled=true;
      const baseR = calcBaseOrbitR();
      const zoomBackInterval = setInterval(()=>{
        orbitR += (baseR - orbitR) * 0.08; updateCamera();
        if(Math.abs(orbitR - baseR) < 0.3){ orbitR = baseR; updateCamera(); clearInterval(zoomBackInterval); }
      }, 16);
      const rt=msgs[sim.result]||['',''];
      setMsg(rt[0],rt[1]);
      document.getElementById('s-res').textContent=labels[sim.result]||sim.result;
      document.getElementById('r-dist').textContent=(Math.hypot(sim.end.x-G.hole.x,sim.end.z-G.hole.z)).toFixed(1)+'m';
      document.getElementById('result-row').style.display='flex';
    }, shotInitSpeed, lippedOut);
  }, 0);
}

// ─── PIN TOGGLE ───────────────────────────────────────────────────────────────
function togglePin() {
  pinIn = !pinIn;
  const btn = document.getElementById('btn-pin');
  btn.textContent = pinIn ? 'PIN IN' : 'PIN OUT';
  btn.className = pinIn ? 'btn' : 'btn pin-out';
  updatePinVisibility();
  // Ideal line changes when pin is removed (no pin collision), recompute
  idealData = null;
  if (showIdeal && G) {
    if (idealLineObj) { scene.remove(idealLineObj); if(idealLineObj.geometry) idealLineObj.geometry.dispose(); idealLineObj = null; }
    idealData = findIdeal(G);
    idealLineObj = makeLine3D(idealData.path.pts, 0x5ab4ff, 0.75);
    scene.add(idealLineObj);
  }
}


function toggleIdeal(){
  if(!G) return;
  showIdeal=!showIdeal;
  const btn=document.getElementById('btn-ideal');
  btn.textContent=showIdeal?'HIDE IDEAL':'IDEAL LINE';
  btn.className=showIdeal?'btn ideal-on':'btn';
  if(idealLineObj){scene.remove(idealLineObj);if(idealLineObj.geometry)idealLineObj.geometry.dispose();idealLineObj=null;}
  if(showIdeal){
    if(!idealData) idealData=findIdeal(G);
    idealLineObj=makeLine3D(idealData.path.pts,0x5ab4ff,0.75); scene.add(idealLineObj);
    const ia=Math.atan2(idealData.az-G.ball.z,idealData.ax-G.ball.x)*180/Math.PI;
    document.getElementById('s-ideal').textContent=ia.toFixed(1)+'°';
  }
}

// ─── NEW / RESET ──────────────────────────────────────────────────────────────
// Camera orbit radius sized to putt distance: close enough to see the cup clearly
function calcBaseOrbitR() {
  const [dMin, dMax] = getDistRange();
  const puttM = G ? Math.hypot(G.hole.x - G.ball.x, G.hole.z - G.ball.z) : (dMin + dMax) / 2;
  // Orbit at ~3× putt distance, clamped for very short / very long putts
  const r = Math.max(isMobile ? 2.5 : 2.0, Math.min(isMobile ? 28 : 22, puttM * 3.2));
  return r;
}

function newGreen(){
  clearPaths(); G=makeTerrain(); buildGreen(G); buildMarkers(G);
  aimPoint=null; idealData=null; animating=false; showIdeal=false; pinIn=true;
  document.getElementById('btn-pin').textContent='PIN IN';
  document.getElementById('btn-pin').className='btn';
  document.getElementById('btn-ideal').textContent='IDEAL LINE';
  document.getElementById('btn-ideal').className='btn';
  document.getElementById('btn-putt').disabled=true;
  document.getElementById('result-row').style.display='none';
  ['s-aim','s-ideal','s-res'].forEach(id=>document.getElementById(id).textContent='—');
  setMsg(isMobile?'Tap the green to aim, then hit PUTT':'Click the green to aim, then hit PUTT','');
  // Camera is set by buildMarkers (called above) — just sync the radius
  orbitR = calcBaseOrbitR();
  updateCamera();
  setTimeout(()=>{ if(G&&!idealData) idealData=findIdeal(G); }, 50);
}

function reset(){
  if(!G) return;
  clearPaths(); buildMarkers(G); aimPoint=null; animating=false;
  animSinking=false;
  if(ballMesh){ ballMesh.visible=true; ballMesh.scale.setScalar(1); }
  document.getElementById('btn-putt').disabled=true;
  document.getElementById('result-row').style.display='none';
  ['s-aim','s-res'].forEach(id=>document.getElementById(id).textContent='—');
  setMsg('Pick a new aim point','');
}

document.getElementById('btn-putt').addEventListener('click',putt);
document.getElementById('btn-pin').addEventListener('click',togglePin);
document.getElementById('btn-ideal').addEventListener('click',toggleIdeal);
document.getElementById('btn-new').addEventListener('click',newGreen);
document.getElementById('btn-reset').addEventListener('click',reset);

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
function render(now){
  requestAnimationFrame(render);
  if(animating) tickBallAnim(now);
  // Gentle flag wave (only when pin is in)
  if(pinIn && holeGroup && holeGroup.children.length >= 6){
    const flagMesh = holeGroup.children[5];
    if(flagMesh){
      const t = now * 0.001;
      flagMesh.rotation.y = Math.sin(t * 1.8) * 0.18;
      flagMesh.rotation.z = Math.sin(t * 2.3) * 0.06;
    }
  }
  drawAimOverlay();
  renderer.render(scene,camera);
}

newGreen();
requestAnimationFrame(render);
</script>
